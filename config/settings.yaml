# AI 配置

ai:
  # 默认使用的 provider: anthropic | gemini | openai
  defaultProvider: anthropic

  # 并发控制配置（已调整：降低并发压力）
  defaultBatchSize: 3      # 批次大小：5 → 3（降低40%）
  defaultConcurrency: 1    # 最大并发数：2 → 1（降低50%）

  # 重试配置
  retry:
    maxRetries: 3          # 最大重试次数
    initialDelay: 1000     # 初始延迟(ms)
    maxDelay: 30000        # 最大延迟(ms)
    backoffFactor: 2       # 退避因子

  anthropic:
    authToken: 7152d6764d10401fa7e5882ec44d071d.OKXrmnwAgD1ZOcCp
    model: GLM-5
    baseUrl: https://open.bigmodel.cn/api/anthropic

  gemini:
    apiKey: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
    baseUrl: https://generativelanguage.googleapis.com/v1beta/models

  openai:
    apiKey: ${OPENAI_API_KEY}
    model: gpt-4o-mini
    baseUrl: https://api.openai.com/v1
