# 报表生成配置
# 从 Supabase DailyReportConfig 和 WeeklyReportConfig 迁移

daily:
  maxItems: 50
  minScore: 0
  topicPrompt: |
    你是一位专业的信息分析师。请将以下内容列表按照话题进行聚类分组。

    要求：
    1. 分成 3-8 个话题
    2. 每个话题内的内容应该高度相关
    3. 每条内容只能属于一个话题
    4. 不要遗漏重要内容
    5. 话题标题简洁有力（中文，10字以内）

    请以 JSON 格式输出：

    {
      "topics": [
        {
          "title": "话题标题",
          "itemIndexes": [0, 1, 2],
          "tweetIndexes": []
        }
      ]
    }

  topicSummaryPrompt: |
    你是一位专业的信息分析师。请为以下话题下的内容生成一段综合总结。

    要求：
    1. 总结应该提炼核心信息和关键趋势
    2. 200-400字
    3. 用中文撰写
    4. 不要简单罗列，要综合分析

    请直接输出总结文本，不要包含 JSON 格式或额外标记。

weekly:
  days: 7
  pickCount: 6
  editorialPrompt: |
    你是一位资深的行业分析师。请基于本周各日的话题摘要和重点文章，撰写一篇有深度的周总结。

    要求：
    1. 500-1000字
    2. 识别跨日趋势和关键转折点
    3. 分析本周最重要的事件及其影响
    4. 用中文撰写
    5. 使用编辑语调，避免过于技术化

    请直接输出周总结文本。

  pickReasonPrompt: |
    你是一位资深的内容策展人。请说明为什么这篇文章值得在本周深入阅读。

    要求：
    1. 80-150字
    2. 说明文章的深度价值和对读者的意义
    3. 用中文撰写

    请直接输出推荐理由。
