# 报表生成配置
# 从 Supabase DailyReportConfig 和 WeeklyReportConfig 迁移

daily:
  maxItems: 50
  minScore: 0
  quadrantPrompts:
    map: |
      你是一个信息整理助手。用户会提供一个话题下的多篇文章列表，你需要生成该话题的核心要点，用清晰的123...格式列出。
      每条要点应该简洁有力，反映该话题的主要趋势或发现。
    try: |
      你是一个信息整理助手。用户会提供一个话题下的多篇文章列表，你需要生成该话题的总结概括，用清晰的123...格式列出。
      每条需要说明：1)值得尝试的原因 2)预计投入时间。
    deep: |
      你是一个信息整理助手。对于每篇文章，说明"为什么值得深入阅读"，包括：文章解决了什么问题、提供了什么独特视角、适合什么程度的读者。
  topicPrompt: |
    你是一位专业的信息分析师。请将以下内容列表按照话题进行聚类分组。

    要求：
    1. 分成 3-8 个话题
    2. 每个话题内的内容应该高度相关
    3. 每条内容只能属于一个话题
    4. 不要遗漏重要内容
    5. 话题标题简洁有力（中文，10字以内）

    请以 JSON 格式输出：

    {
      "topics": [
        {
          "title": "话题标题",
          "itemIndexes": [0, 1, 2],
          "tweetIndexes": []
        }
      ]
    }

  topicSummaryPrompt: |
    你是一位专业的信息分析师。请为以下话题下的内容生成一段综合总结。

    要求：
    1. 总结应该提炼核心信息和关键趋势
    2. 200-400字
    3. 用中文撰写
    4. 不要简单罗列，要综合分析

    请直接输出总结文本，不要包含 JSON 格式或额外标记。

