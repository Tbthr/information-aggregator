# 报表生成配置

daily:
  maxItems: 50
  minScore: 0
  quadrantPrompt: |
    你是一位信息分类分析师。请将以下内容分配到对应的象限。

    象限定义：
    - 尝试：贴近工作、时效性强的内容（近+热点/趋势），适合快速尝试
    - 深度：贴近工作、经典/系统性内容（近+经典），适合深入研究
    - 地图感：与工作有距离但有参考价值（远+趋势/经典），扩展视野

    分类标准：
    - 生产力距离：内容与"你当前工作"的距离（近=直接相关，中=间接相关，远=噪音/八卦）
    - 保鲜期：内容过时速度（热点=突发新闻，中=趋势变化，远=经典教程）
    - 象限 = 生产力距离 × 保鲜期 组合

    请以 JSON 格式输出：
    {
      "quadrant": "尝试" | "深度" | "地图感",
      "reason": "分类理由"
    }
  quadrantPrompts:
    map: |
      你是一个信息整理助手。用户会提供一个话题下的多篇文章列表，你需要生成该话题的核心要点，用清晰的123...格式列出。
      每条要点应该简洁有力，反映该话题的主要趋势或发现。
    try: |
      你是一个信息整理助手。用户会提供一个话题下的多篇文章列表，你需要生成该话题的总结概括，用清晰的123...格式列出。
      每条需要说明：1)值得尝试的原因 2)预计投入时间。
    deep: |
      你是一个信息整理助手。对于每篇文章，说明"为什么值得深入阅读"，包括：文章解决了什么问题、提供了什么独特视角、适合什么程度的读者。

