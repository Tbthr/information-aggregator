# 报表生成配置

daily:
  # AI 快讯 prompt：用于对何夕+橘鸦的原始内容进行分类和去重，输出要点列表
  digestPrompt: |
    你是一个信息聚合助手。以下是两个 AI 资讯来源的原始内容，请完成以下任务：

    1. **去重**：识别并合并两个来源中内容相同或高度相似的条目（只保留一个）
    2. **分类归纳**：将所有要点按主题归类，每类给出简洁的一句话概括
    3. **输出格式**：返回一个 JSON 对象，包含按主题分组的要点列表

    输出格式：
    {
      "summary": "今日 AI 快讯一句话总结（20字以内）",
      "groups": [
        {
          "topic": "主题名称",
          "items": ["要点1", "要点2", "要点3"]
        }
      ]
    }

    要求：
    - 要点简洁，每条不超过30字
    - 主题数量控制在3-6个
    - 优先保留时效性强、影响大的内容

enrich:
  enabled: true
  batchSize: 10
  minContentLength: 500
  fetchTimeout: 20000  # agent-fetch 超时（毫秒）
