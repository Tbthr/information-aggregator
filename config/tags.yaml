# Tags 配置

tags:
  - id: github
    name: GitHub 趋势
    description: |
      关注 GitHub 上的热门开源项目和趋势仓库。
      优先保留：创新项目、实用工具、值得关注的新技术
      可以过滤：重复项目、低质量项目、纯营销项目
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0

  - id: karpathy-picks
    name: Karpathy 精选技术博客
    description: |
      90个来自 Hacker News Popularity Contest 2025 的优质 RSS 源（由 Karpathy 精选）
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0

  - id: tech-news
    name: 科技资讯聚合
    description: |
      关注中文科技资讯和行业动态。
      优先保留：深度分析、原创观点、重要新闻、技术趋势
      可以过滤：营销内容、浅层资讯、转载文章、广告软文
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0
