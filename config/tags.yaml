# Tags 配置
# 过滤机制：string.includes() 简单包含（非正则），匹配 title + summary + content（全小写），OR 逻辑

tags:
  - id: ai-news
    name: AI 资讯
    description: |
      关注 AI 领域的最新动态、产品发布、技术突破和行业趋势。
      优先保留：重要发布、深度分析、技术突破、行业影响
      可以过滤：营销软文、重复报道、浅层转载
    includeRules:
      # AI 模型/产品发布
      - "openai"
      - "anthropic"
      - "google ai"
      - "gemma"
      - "qwen"
      - "claude"
      - "gpt"
      - "llm"
      - "大模型"
      - "大语言模型"
      # AI 行业动态
      - "ai 行业"
      - "ai 创业"
      - "ai 投资"
      - "ai 发布"
      - "ai 模型"
      # Agent/工具
      - "agent"
      - "computer use"
      - "cursor"
      - "copilot"
    excludeRules:
      # 营销/广告
      - "广告"
      - " sponsored"
      - "affiliate"
      - "推广"
      # 低质量内容
      - "100 万人"
      - "震惊"
      - "必看"
    scoreBoost: 1.0

  - id: ai
    name: AI 技术
    description: |
      AI 技术相关的深度内容，包括研究论文、技术博客、实践分享。
      优先保留：原创观点、技术分析、实践经验
      可以过滤：浅层介绍、纯营销内容
    includeRules:
      # AI/ML 技术
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "transformer"
      - "llm"
      - "reinforcement learning"
      - "training"
      - "inference"
      # AI 研究
      - "arxiv"
      - "paper"
      - "research"
      - "benchmark"
      # AI 编程
      - "ai coding"
      - "copilot"
      - "cursor"
      - "llm"
      - "code generation"
      - "vibe coding"
      # Agent 系统
      - "agent"
      - "autonomous"
      - "reasoning"
      - "reasoning model"
    excludeRules:
      # 营销内容
      - "sponsored"
      - "advertisement"
      - "affiliate"
      - "promoted"
      # 低质量 AI 内容
      - "ai will replace"
      - "make money with ai"
      - "ai passive income"
    scoreBoost: 1.0

  - id: github
    name: GitHub 趋势
    description: |
      关注 GitHub 上的热门开源项目和趋势仓库。
      优先保留：创新项目、实用工具、值得关注的新技术
      可以过滤：重复项目、低质量项目、纯营销项目
    includeRules:
      - "github"
      - "open source"
      - "repository"
      - "stars"
      - "release"
      - "library"
      - "framework"
      - "tool"
      - "cli"
      - "api"
      - "rust"
      - "zig"
      - "python"
      - "typescript"
      - "javascript"
      - "golang"
      - "repo"
    excludeRules:
      - "forked"
      - "mirror"
      - "archived"
    scoreBoost: 1.0

  - id: karpathy-picks
    name: Karpathy 精选技术博客
    description: |
      90个来自 Hacker News Popularity Contest 2025 的优质 RSS 源（由 Karpathy 精选）
      内容涵盖：编程语言、系统设计、安全研究、硬件/嵌入式、游戏引擎、
      技术历史、数学、分布式系统、工程哲学、AI/ML 等
    includeRules:
      # 编程/系统
      - "programming"
      - "software"
      - "algorithm"
      - "data structure"
      - "distributed system"
      - "database"
      - "concurrency"
      - "performance"
      - "optimization"
      - "rust"
      - "zig"
      - "python"
      - "javascript"
      - "typescript"
      - "c++"
      - "go"
      - "ruby"
      # 系统/运维
      - "linux"
      - "unix"
      - "freebsd"
      - "nixos"
      - "server"
      - "infrastructure"
      - "kubernetes"
      - "docker"
      - "devops"
      # 安全/隐私
      - "security"
      - "privacy"
      - "cryptography"
      - "vulnerability"
      - "exploit"
      - "malware"
      - "hack"
      - "infosec"
      - "surveillance"
      # AI/ML
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "llm"
      - "artificial intelligence"
      - "gpt"
      - "transformer"
      - "ai agent"
      - "ai safety"
      # 硬件/嵌入式
      - "hardware"
      - "embedded"
      - "microcontroller"
      - "raspberry pi"
      - "arduino"
      - "risc-v"
      - "arm"
      # 游戏/图形
      - "game engine"
      - "graphics"
      - "rendering"
      - "quake"
      - "opengl"
      - "vulkan"
      # 技术历史/考古
      - "history"
      - "retro"
      - "vintage computing"
      - "archaeology"
      - "computing history"
      # 数学/理论
      - "mathematics"
      - "math"
      - "algorithm"
      - "complexity"
      - "cryptography"
      # 工程哲学
      - "software engineering"
      - "architecture"
      - "conway's law"
      - "technical debt"
      - "design pattern"
    excludeRules:
      # 营销/推广
      - "sponsored"
      - "advertisement"
      - "affiliate"
      - "promoted"
      - "buy now"
      - "limited time"
      # 非技术内容
      - "recipe"
      - "cooking"
      - "gaming"
      - "esports"
      - "sports"
      # 低质量 AI 内容
      - "passive income"
      - "make money online"
      - "ai will replace programmers"
      - "100x developer"
