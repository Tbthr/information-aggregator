# Tags 配置

tags:
  - id: ai-news
    name: AI 资讯
    description: |
      关注 AI 领域的最新动态、产品发布、技术突破和行业趋势。
      优先保留：重要发布、深度分析、技术突破、行业影响
      可以过滤：营销软文、重复报道、浅层转载
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0

  - id: ai
    name: AI 技术
    description: |
      AI 技术相关的深度内容，包括研究论文、技术博客、实践分享。
      优先保留：原创观点、技术分析、实践经验
      可以过滤：浅层介绍、纯营销内容
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0

  - id: github
    name: GitHub 趋势
    description: |
      关注 GitHub 上的热门开源项目和趋势仓库。
      优先保留：创新项目、实用工具、值得关注的新技术
      可以过滤：重复项目、低质量项目、纯营销项目
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0

  - id: karpathy-picks
    name: Karpathy 精选技术博客
    description: |
      90个来自 Hacker News Popularity Contest 2025 的优质 RSS 源（由 Karpathy 精选）
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0

  - id: tech-news
    name: 科技资讯聚合
    description: |
      关注中文科技资讯和行业动态。
      优先保留：深度分析、原创观点、重要新闻、技术趋势
      可以过滤：营销内容、浅层资讯、转载文章、广告软文
    includeRules: []
    excludeRules: []
    scoreBoost: 1.0
