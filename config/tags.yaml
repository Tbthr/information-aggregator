  - id: tech-news
    name: 科技资讯聚合
    description: |
      关注中文科技资讯和行业动态。
      优先保留：深度分析、原创观点、重要新闻、技术趋势
      可以过滤：营销内容、浅层资讯、转载文章、广告软文
    includeRules:
      # 技术趋势
      - "技术"
      - "ai"
      - "编程"
      - "开源"
      - "软件"
      - "硬件"
      - "产品"
      - "发布"
      - "趋势"
      # 行业分析
      - "行业"
      - "创业"
      - "投资"
      - "分析"
      - "观点"
      - "评论"
      # 科技平台
      - "github"
      - "twitter"
      - "hacker news"
      - "product hunt"
    excludeRules:
      # 营销内容
      - "广告"
      - "赞助"
      - "推广"
      - " affiliate"
      # 标题党
      - "震惊"
      - "必看"
      - "万人"
      - "火爆"
      # 低质量
      - "转载"
      - "摘录"
    scoreBoost: 1.0
