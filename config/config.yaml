enrich:
  enabled: true
  batchSize: 10
  minContentLength: 500
  fetchTimeout: 20000

aiFlashCategorization:
  enabled: true
  prompt: |
    你是一个内容分类助手。请将以下 AI 快讯条目分类到以下类别：产品更新 / 前沿研究 / 行业动态 / 开源项目 / 社媒精选 / 其他。每个条目必须归属一个类别，不要改写任何内容。输出 JSON 格式：{ "categories": [{ "name": "分类名", "items": [{ "title": "...", "url": "...", "summary": "...", "sourceName": "..." }] }, ...] }。类别数量不超过 6 个，"其他"作为最后兜底。

    输入条目：
    {items}

ranking:
  sourceWeight: 0.4
  engagement: 0.15

dedupe:
  nearThreshold: 0.75

content:
  truncationMarkers:
    - "[...]"
    - "Read more"
    - "click here"
    - "read more at"
    - "来源："
    - "Original:"

aiFlashSources:
  - id: hexi-daily
    adapter: hexi-daily
    url: https://ai.hubtoday.app/{month}/{date}/
    enabled: true

  - id: juya-daily
    adapter: juya-daily
    url: https://imjuya.github.io/juya-ai-daily/rss.xml
    enabled: true

  - id: clawfeed-daily
    adapter: clawfeed-daily
    url: https://clawfeed.kevinhe.io/feed/kevin
    enabled: true
