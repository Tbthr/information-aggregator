# Main application config (centralized configuration)
# This file consolidates tags, enrich, ranking, dedupe, content, and aiFlashSources

tags:
  - id: ai-news
    name: AI 资讯
    description: |
      关注 AI 领域的最新动态、产品发布、技术突破和行业趋势。
      优先保留：重要发布、深度分析、技术突破，行业影响
      可以过滤：营销软文、重复报道、浅层转载
    enabled: true
    includeRules:
      - "openai"
      - "anthropic"
      - "google ai"
      - "gemma"
      - "qwen"
      - "claude"
      - "gpt"
      - "llm"
      - "大模型"
      - "大语言模型"
      - "ai 行业"
      - "ai 创业"
      - "ai 投资"
      - "ai 发布"
      - "ai 模型"
      - "agent"
      - "computer use"
      - "cursor"
      - "copilot"
    excludeRules:
      - "广告"
      - " sponsored"
      - "affiliate"
      - "推广"
      - "100 万人"
      - "震惊"
      - "必看"
    scoreBoost: 1.0

  - id: ai
    name: AI 技术
    description: |
      AI 技术相关的深度内容，包括研究论文、技术博客、实践分享。
      优先保留：原创观点、技术分析、实践经验
      可以过滤：浅层介绍、纯营销内容
    enabled: true
    includeRules:
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "transformer"
