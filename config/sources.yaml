# 数据源配置

sources:
  # === AI 资讯 / 精选博客 (RSS) ===
  - type: clawfeed
    id: clawfeed-kevinhe-io-feed-kevin
    name: ClawFeed - AI 新闻4小时简报
    url: https://clawfeed.kevinhe.io/feed/kevin
    enabled: true
    tagIds: [ai-news]
    contentType: digest

  - type: rss
    id: ai-hubtoday-blog
    name: 何夕2077的AI资讯 | 精选AI新闻与工具 | 洞悉AI前沿动态
    url: https://ai.hubtoday.app/blog/index.xml
    enabled: true
    tagIds: [ai-news]
    contentType: article

  # 可用参数见：https://github.com/ginobefun/BestBlogs/blob/main/BestBlogs_RSS_Doc.md
  - type: rss
    id: bestblogs-dev-zh
    name: BestBlogs.dev
    url: https://www.bestblogs.dev/zh/feeds/rss
    enabled: true
    tagIds: [tech-news]
    contentType: article

  - type: rss
    id: juya-ai-daily
    name: 橘鸦AI早报
    url: https://imjuya.github.io/juya-ai-daily/rss.xml
    enabled: true
    tagIds: [ai-news]
    contentType: article

  # zeli: 隐藏 API (https://zeli.app/api/hacker-news?type=hot24h)
  - type: zeli
    id: zeli-app
    name: Zeli - Read Hacker News and AI Papers with Digest
    url: https://zeli.app/
    enabled: true
    tagIds: [ai-news]
    contentType: article

  # attentionvc: 追踪 X/Twitter 热门文章排行榜（24h AI 分类）
  - type: attentionvc
    id: attentionvc-ai-24h
    name: AttentionVC - We're all attention VCs
    url: https://attentionvc.ai
    enabled: true
    tagIds: [ai-news]
    contentType: article

  # === Twitter/X (需要 auth) ===
  - type: twitter
    id: twitter
    name: twitter
    enabled: true
    tagIds: [ai]
    contentType: tweet
    auth:
      authToken: ${TWITTER_AUTH_TOKEN}
      ct0: ${TWITTER_CT0}
      birdMode: home

  - type: github-trending
    id: github-com-trending
    name: Trending repositories on GitHub today · GitHub
    description: GitHub 趋势
    url: https://github.com/trending
    enabled: true
    tagIds: [github]
    contentType: repository
