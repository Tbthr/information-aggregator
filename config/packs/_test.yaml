# 测试用 Pack
# 包含所有数据源类型的测试用 Pack，用于 smoke 测试和验证
# 注意：X 类型数据源需要 bird CLI 和 Chrome 授权
# 不应作为正式 Pack 使用

pack:
  id: _test
  name: 测试 Pack
  description: 包含所有数据源类型的测试用 Pack，仅用于 smoke 测试

sources:
  # === RSS 类型 ===
  - type: rss
    url: https://simonwillison.net/atom/everything/
    description: Simon Willison 博客

  # === JSON Feed 类型 ===
  - type: json-feed
    url: https://www.buzzing.cc/feed.json
    description: Buzzing，中英双语资讯聚合

  # === GitHub Trending 类型 ===
  - type: github_trending
    url: https://github.com/trending
    description: GitHub 趋势页面

  # === X/Twitter 类型 (需要 bird CLI 授权) ===
  - type: x_bookmarks
    url: https://x.com/i/bookmarks
    description: X 书签
    configJson: '{"birdMode":"bookmarks","count":10}'
