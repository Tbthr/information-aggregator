# 测试用 Pack
# 包含所有数据源类型的测试用 Pack，用于 smoke 测试和验证
# 注意：X 类型数据源需要 bird CLI 和 Chrome 授权
# 不应作为正式 Pack 使用

pack:
  id: _test
  name: 测试 Pack
  description: 包含所有数据源类型的测试用 Pack，仅用于 smoke 测试
  keywords:
    - test
    - smoke

sources:
  # === RSS 类型 ===
  - type: rss
    url: https://simonwillison.net/atom/everything/
    description: Simon Willison 博客

  # === JSON Feed 类型 ===
  - type: json-feed
    url: https://www.jsonfeed.org/feed.json
    description: JSON Feed 官方

  # === GitHub Trending 类型 ===
  - type: github_trending
    url: https://github.com/trending
    description: GitHub 趋势页面

  # === X/Twitter 类型 (需要 bird CLI 授权) ===
  - type: x_home
    url: https://x.com/home
    description: X 首页时间线
    configJson: '{"birdMode":"home","count":10}'

  - type: x_list
    url: https://x.com/i/lists/2021198996157710621
    description: X 列表
    configJson: '{"birdMode":"list","listId":"2021198996157710621","count":10}'

  - type: x_bookmarks
    url: https://x.com/i/bookmarks
    description: X 书签
    configJson: '{"birdMode":"bookmarks","count":10}'

  - type: x_likes
    url: https://x.com/i/likes
    description: X 点赞
    configJson: '{"birdMode":"likes","count":10}'
