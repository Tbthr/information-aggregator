sources:
  # Curated defaults and roadmap/reference examples.
  # Runnable defaults stay in the active packs.
  # Disabled entries below may be either:
  # 1. structurally valid reference sources
  # 2. non-runnable schema placeholders with config.placeholderMode: schema
  - id: openai-news
    name: OpenAI News
    type: rss
    enabled: true
    url: https://openai.com/news/rss.xml
  - id: hugging-face-blog
    name: Hugging Face Blog
    type: rss
    enabled: true
    url: https://huggingface.co/blog/feed.xml
  - id: infoq-cn
    name: InfoQ CN
    type: rss
    enabled: true
    url: https://www.infoq.cn/feed
  - id: techurls
    name: TechURLs
    type: website
    enabled: true
    url: https://techurls.com/
  - id: buzzing
    name: Buzzing
    type: json-feed
    enabled: true
    url: https://www.buzzing.cc/feed.json
  - id: info-flow
    name: Info Flow
    type: website
    enabled: true
    url: https://iris.findtruman.io/web/info_flow
  - id: bestblogs
    name: BestBlogs Newsletter
    type: website
    enabled: true
    url: https://www.bestblogs.dev/en/newsletter
  - id: tophub
    name: TopHub
    type: website
    enabled: true
    url: https://tophub.today/
  - id: zeli
    name: Zeli
    type: website
    enabled: true
    url: https://zeli.app/
  - id: ai-hubtoday
    name: AI HubToday
    type: website
    enabled: true
    url: https://ai.hubtoday.app/
  - id: aibase-news
    name: AIbase News
    type: website
    enabled: true
    url: https://www.aibase.com/zh/news
  - id: aihot-today
    name: AI Today Hotlist
    type: website
    enabled: true
    url: https://aihot.today/
  - id: newsnow
    name: NewsNow
    type: website
    enabled: true
    url: https://newsnow.busiyi.world/
  - id: waytoagi-updates
    name: WaytoAGI Updates
    type: website
    enabled: true
    url: https://waytoagi.feishu.cn/wiki/RuBhwe63Viw8s8k1xCYc0zo1nEb
  - id: simon-willison
    name: Simon Willison
    type: website
    enabled: true
    url: https://simonwillison.net/
  - id: overreacted
    name: Overreacted
    type: rss
    enabled: true
    url: https://overreacted.io/rss.xml
  - id: paul-graham
    name: Paul Graham Essays
    type: rss
    enabled: true
    url: http://www.aaronsw.com/2002/feeds/pgessays.rss
  - id: gwern
    name: Gwern
    type: rss
    enabled: true
    url: https://gwern.substack.com/feed
  - id: troy-hunt
    name: Troy Hunt
    type: rss
    enabled: true
    url: https://www.troyhunt.com/rss/
  - id: clawfeed-digest-json
    name: ClawFeed Digest JSON
    type: json-feed
    enabled: false
    url: https://digest.kevinhe.io/feed/kevin.json
  - id: clawfeed-hn-front-page
    name: ClawFeed Hacker News Front Page
    type: hn
    enabled: false
    url: https://hn.algolia.com/api/v1/search?tags=front_page
    config:
      placeholderMode: schema
      expectedPayload: hn-search
  - id: clawfeed-reddit-ai
    name: ClawFeed Reddit Artificial
    type: reddit
    enabled: false
    url: https://www.reddit.com/r/artificial/hot.json?limit=25
  - id: ai-news-radar-opml
    name: AI News Radar OPML
    type: opml_rss
    enabled: false
    config:
      path: ./fixtures/ai-news-radar.opml
  - id: clawfeed-curated-digest
    name: ClawFeed Curated Digest
    type: digest_feed
    enabled: false
    url: https://digest.kevinhe.io/
    config:
      format: html
      linkSelector: article a[href]
  - id: clawfeed-custom-api
    name: ClawFeed Custom API
    type: custom_api
    enabled: false
    url: https://example.com/api/clawfeed
    config:
      placeholderMode: schema
  - id: clawfeed-github-trending
    name: ClawFeed GitHub Trending
    type: github_trending
    enabled: false
    url: https://github.com/trending
    config:
      language: typescript
      since: daily
  - id: smaug-bookmarks
    name: Smaug Bookmark Feed
    type: x_bookmarks
    enabled: false
    url: https://x.com/i/bookmarks
    config:
      birdMode: bookmarks
  - id: smaug-likes
    name: Smaug Likes Feed
    type: x_likes
    enabled: false
    url: https://x.com/i/likes
    config:
      birdMode: likes
  - id: smaug-multi
    name: Smaug Multi Feed
    type: x_multi
    enabled: false
    url: https://x.com/home
    config:
      birdMode: multi
      listIds:
        - 12345
  - id: x-ai-topic-selector-list
    name: X AI Topic Selector List
    type: x_list
    enabled: false
    url: https://x.com/i/lists/2021198996157710621
    config:
      birdMode: list
      listId: "2021198996157710621"
  - id: x-ai-topic-selector-home
    name: X AI Topic Selector Home
    type: x_home
    enabled: false
    url: https://x.com/home
    config:
      birdMode: home
