default: anthropic

providers:
  anthropic:
    apiKey: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-20250514
    baseUrl: https://api.anthropic.com

  gemini:
    apiKey: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
    baseUrl: https://generativelanguage.googleapis.com

retry:
  maxRetries: 3
  initialDelayMs: 1000
  maxDelayMs: 30000
  backoffFactor: 2

batch:
  size: 5
  concurrency: 2
