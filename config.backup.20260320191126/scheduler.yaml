# config/scheduler.yaml
scheduler:
  jobs:
    fetch-and-process:
      cron: "0 */30 * * * *"
      description: "获取所有 enabled sources 数据，处理并持久化"
      enabled: true

    daily-report:
      cron: "0 30 6 * * *"
      description: "根据 daily.yaml 配置生成日报"
      enabled: true

    weekly-report:
      cron: "0 0 7 * * 1"
      description: "根据 weekly.yaml 配置生成周报"
      enabled: true
