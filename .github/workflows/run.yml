# .github/workflows/run.yml
name: Run Aggregator
on:
  schedule:
    - cron: "0 0 * * *"  # 每天 00:00 UTC = 8:00 北京时间
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run aggregator
        env:
          ANTHROPIC_API_KEYS: ${{ secrets.ANTHROPIC_API_KEYS }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          ANTHROPIC_BASE_URLS: ${{ vars.ANTHROPIC_BASE_URLS }}
        run: bun run src/cli/run.ts

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.0

      - name: Build Zola
        run: zola build

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(daily): update $(date +%Y-%m-%d)"
          file_pattern: "content/daily/*.md"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
