name: Daily Brief

on:
  schedule:
    # 每天 UTC 1:00 运行（北京时间 9:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      pack:
        description: 'Pack ID(s), comma-separated'
        required: false
        default: 'tech-news'
      window:
        description: 'Time window'
        required: false
        default: '24h'

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create output directory
        run: mkdir -p output/daily

      - name: Run aggregation
        env:
          # AI Provider 配置
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # X/Twitter 认证（如需使用）
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: |
          PACK="${{ github.event.inputs.pack || 'tech-news' }}"
          WINDOW="${{ github.event.inputs.window || '24h' }}"
          DATE=$(date +%Y-%m-%d)

          bun src/cli/main.ts run \
            --pack "$PACK" \
            --view daily-brief \
            --window "$WINDOW" \
            --output "output/daily/${DATE}.md"

      - name: Generate index
        run: |
          echo "# Daily Briefs" > output/daily/README.md
          echo "" >> output/daily/README.md
          echo "每日技术资讯聚合。" >> output/daily/README.md
          echo "" >> output/daily/README.md
          echo "## 历史记录" >> output/daily/README.md
          ls -1 output/daily/*.md 2>/dev/null | grep -v README | sort -r | head -10 | while read f; do
            DATE=$(basename "$f" .md)
            echo "- [$DATE](./${DATE}.md)" >> output/daily/README.md
          done || true

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update daily brief - $(date +%Y-%m-%d)"
          file_pattern: output/
          branch: main
